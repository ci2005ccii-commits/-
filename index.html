<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر | عبود #هاشتاج_شاهد</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0b0b0b; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* اسمك والهاشتاج فوق */
        .header {
            margin-bottom: 15px; text-align: center;
        }
        .header h1 {
            color: #00bfff; font-size: 24px; margin: 0;
            text-shadow: 0 0 10px rgba(0, 191, 255, 0.5);
        }
        .header span { color: white; }

        /* حاوية الفيديو في المنتصف */
        .video-box {
            width: 95%; max-width: 850px;
            aspect-ratio: 16 / 9;
            background: #000;
            border: 2px solid #00bfff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        video { width: 100%; height: 100%; display: block; }

        /* زر تشغيل كبير في حال توقف */
        #play-btn {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 191, 255, 0.8);
            color: white; border: none; padding: 15px 30px;
            font-size: 18px; border-radius: 50px; cursor: pointer;
            z-index: 100; display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>عبود <span>#هاشتاج_شاهد</span></h1>
        <p style="color: #ff0000; font-weight: bold; margin-top: 5px;">مباشر: ريال مدريد × مانشستر سيتي</p>
    </div>

    <div class="video-box">
        <button id="play-btn" onclick="forcePlay()">اضغط لتشغيل البث</button>
        <video id="video" controls autoplay muted playsinline></video>
    </div>

    <p style="color: #888; margin-top: 15px; font-size: 14px;">إذا لم يعمل البث، تأكد من تحديث الصفحة أو أن الرابط لا يزال صالحاً</p>

    <script>
        const video = document.getElementById('video');
        const playBtn = document.getElementById('play-btn');
        // الرابط الذي أرسلته
        const streamUrl = 'http://wjk30.tutor3.site/live/51838_.m3u8?session=fgXV65Um2lfy1XM-PnwCNI6JKBGv-7c8uR6nyqvK0yPD6645oYewQjFQ6kFRCCFO8v9weMjgiE5rg7pCM4ODC3gY8vmYU53y&location=local';

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play().catch(() => {
                    // إذا منع المتصفح التشغيل التلقائي، نظهر الزر
                    playBtn.style.display = 'block';
                });
            });
            
            // في حال فشل الرابط
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    console.log("الرابط قد يكون متوقفاً من المصدر");
                }
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
        }

        function forcePlay() {
            video.play();
            video.muted = false; // تشغيل الصوت عند الضغط
            playBtn.style.display = 'none';
        }
    </script>
</body>
</html>
